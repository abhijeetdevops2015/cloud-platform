apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloud-platform-ingress
  namespace: cloud-platform-dev
  annotations:
    # Instructs the AWS Load Balancer Controller to provision an ALB
    kubernetes.io/ingress.class: alb

    # Internet-facing ALB — change to "internal" for private-only access
    alb.ingress.kubernetes.io/scheme: internet-facing

    # Route traffic to pods using their IP (required for Fargate; works on EC2 too)
    alb.ingress.kubernetes.io/target-type: ip

    # Health check tuning — both services respond 200 at these paths
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"

    # Listen on port 80 (add 443 and a certificate ARN here when TLS is set up)
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'

spec:
  rules:
    - http:
        paths:
          # Backend API routes — all traffic to /health and /db goes to the backend
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 80

          - path: /db
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 80

          # Everything else (including /) goes to the React frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
