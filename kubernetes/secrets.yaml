# IMPORTANT: Do NOT commit real credentials to source control.
# Before applying, populate the values below with actual secrets, e.g.:
#
#   kubectl create secret generic db-credentials \
#     --from-literal=db-host=<your-rds-endpoint> \
#     --from-literal=db-user=postgres \
#     --from-literal=db-password=<your-password> \
#     --from-literal=db-name=appdb \
#     --namespace=cloud-platform-dev
#
# Or apply this file after substituting real values via environment variables:
#   envsubst < secrets.yaml | kubectl apply -f -

apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: cloud-platform-dev   # Change per environment (cloud-platform-staging, cloud-platform-prod)
type: Opaque
stringData:
  db-host: "REPLACE_WITH_RDS_ENDPOINT"
  db-user: "postgres"
  db-password: "REPLACE_WITH_DB_PASSWORD"
  db-name: "appdb"
