apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend-prod
  namespace: argocd
  labels:
    app: backend
    environment: prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/placeholder/cloud-platform.git
    targetRevision: main
    path: kubernetes/overlays/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: cloud-platform-prod

  syncPolicy:
    # Prod: NO auto-sync. Manual promotion only — sync requires explicit approval.
    #   argocd app sync backend-prod
    syncOptions:
      - CreateNamespace=false
      - PrunePropagationPolicy=foreground
      - PruneLast=true
