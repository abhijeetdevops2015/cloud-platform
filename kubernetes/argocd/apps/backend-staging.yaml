apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend-staging
  namespace: argocd
  labels:
    app: backend
    environment: staging
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/placeholder/cloud-platform.git
    targetRevision: main
    path: kubernetes/overlays/staging

  destination:
    server: https://kubernetes.default.svc
    namespace: cloud-platform-staging

  syncPolicy:
    # Staging: NO auto-sync. A human must trigger sync via the ArgoCD UI or:
    #   argocd app sync backend-staging
    # This ensures staging is a deliberate promotion, not an automatic cascade.
    syncOptions:
      - CreateNamespace=false
      - PrunePropagationPolicy=foreground
      - PruneLast=true
