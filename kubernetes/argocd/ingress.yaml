# ArgoCD UI Ingress
# Exposes the ArgoCD server via the AWS Load Balancer Controller.
# Traffic reaches the ArgoCD server over HTTP (ArgoCD runs in --insecure mode);
# the ALB handles the public-facing listener on port 80.
#
# Once a TLS certificate is available, add:
#   alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
#   alb.ingress.kubernetes.io/certificate-arn: <acm-certificate-arn>
# and update alb.ingress.kubernetes.io/listen-ports accordingly.
#
# After applying, get the ALB DNS name with:
#   kubectl get ingress argocd-ingress -n argocd -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-ingress
  namespace: argocd
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    # Route all ArgoCD paths to the server — including the gRPC API used by the CLI
    alb.ingress.kubernetes.io/backend-protocol: HTTP
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
