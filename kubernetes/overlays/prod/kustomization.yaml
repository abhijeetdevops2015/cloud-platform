apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: cloud-platform-prod

# Image tags for prod are promoted manually after staging validation.
# ArgoCD prod Applications require a manual sync — no auto-sync.
images:
  - name: backend
    newName: PLACEHOLDER_ECR_REGISTRY/cloud-platform-dev-backend
    newTag: PLACEHOLDER_SHA
  - name: frontend
    newName: PLACEHOLDER_ECR_REGISTRY/cloud-platform-dev-frontend
    newTag: PLACEHOLDER_SHA
