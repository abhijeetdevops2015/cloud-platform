apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: cloud-platform-staging

# Image tags for staging are promoted manually (or via a separate promotion workflow).
# To promote a dev image to staging:
#   kustomize edit set image backend=<ecr-url>:<sha>
#   kustomize edit set image frontend=<ecr-url>:<sha>
# Then commit and push — ArgoCD staging Application requires a manual sync.
images:
  - name: backend
    newName: PLACEHOLDER_ECR_REGISTRY/cloud-platform-dev-backend
    newTag: PLACEHOLDER_SHA
  - name: frontend
    newName: PLACEHOLDER_ECR_REGISTRY/cloud-platform-dev-frontend
    newTag: PLACEHOLDER_SHA
