apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - namespace.yaml
  - ingress.yaml

namespace: cloud-platform-staging

# Image tags for staging are updated by the CI promotion workflow.
# When a build is validated in dev and promoted, the CI job runs:
#   cd kubernetes/overlays/staging
#   kustomize edit set image backend=<ecr-url>:<sha>
#   kustomize edit set image frontend=<ecr-url>:<sha>
# Commits the change → ArgoCD detects drift → auto-syncs.
images:
  - name: backend
    newName: 930067562644.dkr.ecr.us-east-1.amazonaws.com/cloud-platform-staging-backend
    newTag: PLACEHOLDER_SHA
  - name: frontend
    newName: 930067562644.dkr.ecr.us-east-1.amazonaws.com/cloud-platform-staging-frontend
    newTag: PLACEHOLDER_SHA
