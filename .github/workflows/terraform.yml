name: Terraform

on:
  pull_request:
    paths:
      - "terraform/**"
  push:
    branches: [main]
    paths:
      - "terraform/**"

# OIDC token + PR comment permissions
permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_WORKING_DIR: terraform/environments/eks/dev

jobs:
  # ── Plan: runs on every PR touching terraform/ ─────────────────────────────
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_TERRAFORM }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
        # Capture output; continue even on plan failure so we can post the error as a comment
        run: |
          terraform plan -no-color 2>&1 | tee plan_output.txt
          echo "PLAN_EXIT=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post Terraform plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planText = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8');
            const exitCode = '${{ steps.plan.outputs.PLAN_EXIT }}';
            const status = exitCode === '0' ? '✅ Success' : exitCode === '2' ? '⚠️ Changes pending' : '❌ Failed';

            const body = [
              `## Terraform Plan — \`dev\` environment`,
              `**Status:** ${status}`,
              ``,
              `<details><summary>Show plan output</summary>`,
              ``,
              `\`\`\``,
              planText.substring(0, 60000),
              `\`\`\``,
              `</details>`,
              ``,
              `_Triggered by commit \`${{ github.sha }}\`_`
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.PLAN_EXIT == '1'
        run: exit 1

  # ── Apply: runs only on push to main ───────────────────────────────────────
  apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    # Prevent concurrent applies from racing on the same state
    concurrency:
      group: terraform-apply-dev
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_TERRAFORM }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
        run: terraform apply -auto-approve
