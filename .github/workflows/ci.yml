name: Build, Push, and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ AWS OIDC login
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::930067562644:role/cloud-platform-dev-github-actions-ci
          aws-region: us-east-1

      # ✅ Login to ECR
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ✅ Generate image tag
      - name: Set image tag
        id: vars
        run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      # 🔥 Build & push backend
      - name: Build & push backend
        run: |
          docker buildx build 
            --platform linux/amd64 
            -t 930067562644.dkr.ecr.us-east-1.amazonaws.com/cloud-platform-dev-backend:${{ steps.vars.outputs.TAG }} 
            --push ./services/backend

      # 🔥 Build & push frontend
      - name: Build & push frontend
        run: |
          docker buildx build 
            --platform linux/amd64 
            -t 930067562644.dkr.ecr.us-east-1.amazonaws.com/cloud-platform-dev-frontend:${{ steps.vars.outputs.TAG }} 
            --push ./services/frontend

      # 🔥 ✅ UPDATE TAG (THIS FIXES YOUR ISSUE)
      - name: Update image tag in kustomization
        run: |
          TAG=${{ steps.vars.outputs.TAG }}

          sed -i "s|newTag: .*|newTag: $TAG|g" kubernetes/overlays/dev/kustomization.yaml

      # 🔥 Commit and push changes
      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add kubernetes/overlays/dev/kustomization.yaml
          git commit -m "update image tag to ${{ steps.vars.outputs.TAG }}" || echo "No changes"
          git push